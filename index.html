<!DOCTYPE html>
<html>
<head>
  <title>Apuni Sarkar - View Certificate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin:0; font-family:Arial; background:#f4f6f9; }
    .header { background:white; padding:12px 20px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; }
    .container { max-width:800px; margin:30px auto; background:white; padding:20px; border-radius:6px; }
    .input-box { width:100%; padding:10px; border:1px solid #ccc; margin-top:10px; }
    .btn { margin-top:10px; padding:10px; background:#28a745; color:white; border:none; width:100%; cursor:pointer; }
    .card { margin-top:20px; border:1px solid #ddd; }
    .card-header { background:#f1f1f1; padding:10px; font-weight:bold; }
    iframe { width:100%; height:600px; border:none; }
    .error { color:red; padding:10px; }
    .appno { padding:10px; font-weight:bold; }
  </style>
</head>

<body>

<div class="header">
  <b>Apuni Sarkar (Uttarakhand)</b>
  <div>English | हिंदी</div>
</div>

<div class="container">
  <h2>View Certificate</h2>

  <input type="text" id="appInput" class="input-box">
  <button class="btn" onclick="searchApp()">Search</button>

  <div class="card">
    <div class="card-header">Certificate</div>
    <div class="appno" id="appText"></div>
    <iframe id="pdfViewer"></iframe>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script>
  const database = {
    "UK26ES0300045530": "certificate1.pdf",
    "UK25ES0300070001": "certificate2.pdf"
  };

  const input = document.getElementById("appInput");
  const pdf = document.getElementById("pdfViewer");
  const text = document.getElementById("appText");
  const error = document.getElementById("errorMsg");

  function searchApp() {
    const value = input.value.trim();

    if (database[value]) {
      text.innerText = "Application No: " + value;
      pdf.src = database[value];
      error.innerText = "";
    } else {
      pdf.src = "";
      text.innerText = "";
      error.innerText = "Request failed with status code 404";
    }
  }

  // 🔥 AUTO LOAD FROM URL
  window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    let appNo = params.get("app");

    if (appNo) {
      input.value = appNo;
      searchApp();
    }
  };
</script>

</body>
</html>
