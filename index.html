<!DOCTYPE html><html>
<head>
  <title>Apuni Sarkar - View Certificate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    .header {
      background: white;
      padding: 12px 20px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 6px;
    }

    h2 {
      margin-top: 0;
    }

    .input-box {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #218838;
    }

    .card {
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .card-header {
      background: #f1f1f1;
      padding: 10px;
      font-weight: bold;
    }

    .appno {
      padding: 10px;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    .error {
      color: red;
      padding: 10px;
    }
  </style></head><body><div class="header">
  Apuni Sarkar (Uttarakhand)
  <div>English | हिंदी</div>
</div><div class="container">
  <h2>View Certificate</h2>  <!-- Input -->  <input type="text" id="appInput" class="input-box" placeholder="Enter Application Number">  <!-- Green Button --><button class="btn" onclick="searchApp()">Search</button>

  <div class="card">
    <div class="card-header">Certificate</div><div class="appno" id="appText"></div>

<iframe id="pdfViewer"></iframe>

<div class="error" id="errorMsg"></div>

  </div>
</div><script>
  let validApp = "UK26ES0300045530";

  function searchApp() {
    let appNo = document.getElementById("appInput").value.trim();
    loadCertificate(appNo);
  }

  function loadCertificate(appNo) {
    if (appNo === validApp) {
      document.getElementById("appText").innerText = "Application No: " + appNo;

      // ✅ FIXED PATH
      document.getElementById("pdfViewer").src = "./certificate.pdf";

      document.getElementById("errorMsg").innerText = "";
    } else {
      document.getElementById("appText").innerText = "";
      document.getElementById("pdfViewer").src = "";
      document.getElementById("errorMsg").innerText = "Request failed with status code 404";
    }
  }

  // ✅ AUTO LOAD FROM URL
  window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    let autoApp = params.get("app");

    if (!autoApp) {
      autoApp = "UK26ES0300045530";
    }

    document.getElementById("appInput").value = autoApp;
    loadCertificate(autoApp);
  };
</script></body>
</html>
